<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg { fill: #0f1115; }
      .panel { fill: #151923; stroke: #2a3142; stroke-width: 1; }
      .panel2 { fill: #111522; stroke: #2a3142; stroke-width: 1; }
      .chip { fill: #1d2433; stroke: #2a3142; stroke-width: 1; }
      .tab { fill: #1a2130; stroke: #2a3142; stroke-width: 1; }
      .tab_on { fill: #16c6d4; }
      .btn2 { fill: #2a3142; }
      .title { fill: #d7dde8; font: 700 22px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #9aa6bd; font: 500 14px "Segoe UI", Arial, sans-serif; }
      .label { fill: #c2cbe0; font: 700 13px "Segoe UI", Arial, sans-serif; }
      .text { fill: #c2cbe0; font: 400 13px "Segoe UI", Arial, sans-serif; }
      .muted { fill: #8b95aa; font: 400 12px "Segoe UI", Arial, sans-serif; }
      .mono { fill: #c2cbe0; font: 500 11px "Consolas", "Segoe UI", monospace; }
      .accent { fill: #16c6d4; font: 800 26px "Segoe UI", Arial, sans-serif; }
      .pill_warn { fill: #3a2c12; stroke: #8b6a2b; stroke-width: 1; }
      .warn { fill: #ffb020; font: 800 12px "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>
  <rect class="panel" x="24" y="20" width="1392" height="68" rx="12"/>
  <text class="accent" x="48" y="62">OrionAgroquim</text>
  <text class="subtitle" x="242" y="60">Teste — FORMA 3 (mais complexa) | estratégia em duas caldas (preparo em etapas)</text>

  <rect class="panel" x="24" y="104" width="420" height="772" rx="12"/>
  <text class="title" x="48" y="146">Alvos e Condições</text>
  <text class="subtitle" x="48" y="170">P2O5 20.00% | Mg 7.259% | Mo 4.3278% | Zn 2.035% | T 25°C | Q.S.P 100 L</text>

  <rect class="panel2" x="44" y="192" width="380" height="258" rx="10"/>
  <text class="label" x="60" y="220">O que é a Forma 3</text>
  <text class="muted" x="60" y="246">- Quando Forma 1 e 2 precipitam</text>
  <text class="muted" x="60" y="268">- Divide o preparo em duas caldas (A e B)</text>
  <text class="muted" x="60" y="290">- Mantém a composição final (somando as duas)</text>
  <text class="muted" x="60" y="312">- Requer procedimento (ordem, T e tempo)</text>
  <text class="muted" x="60" y="346">Exemplo:</text>
  <text class="muted" x="60" y="368">Calda A: Fosfatos + Molibdato</text>
  <text class="muted" x="60" y="390">Calda B: Magnésio + Zinco</text>
  <text class="muted" x="60" y="412">Misturar apenas no momento de uso</text>

  <rect class="panel" x="464" y="104" width="952" height="772" rx="12"/>
  <text class="title" x="488" y="146">Formas de Atingir (Top 5)</text>
  <text class="subtitle" x="488" y="170">Aba atual: FORMA 3 — mais rebuscada (duas caldas)</text>

  <rect class="panel2" x="484" y="192" width="912" height="52" rx="12"/>
  <rect class="tab" x="500" y="204" width="160" height="28" rx="14"/>
  <text class="label" x="546" y="224">FORMA 1</text>
  <rect class="tab" x="668" y="204" width="160" height="28" rx="14"/>
  <text class="label" x="714" y="224">FORMA 2</text>
  <rect class="tab_on" x="836" y="204" width="160" height="28" rx="14"/>
  <text class="label" x="882" y="224" fill="#071014">FORMA 3</text>
  <rect class="btn2" x="1230" y="204" width="146" height="28" rx="10"/>
  <text class="label" x="1250" y="224">GERAR LAUDO</text>

  <rect class="panel2" x="484" y="258" width="912" height="118" rx="12"/>
  <rect class="pill_warn" x="500" y="278" width="170" height="28" rx="14"/>
  <text class="warn" x="530" y="298">EM ETAPAS</text>
  <text class="mono" x="680" y="298">Objetivo: reduzir precipitação no tanque de preparo</text>
  <text class="muted" x="504" y="342">Nota: composição final = soma de Calda A + Calda B (Q.S.P 100 L no uso).</text>

  <rect class="panel2" x="484" y="392" width="912" height="220" rx="12"/>
  <text class="label" x="504" y="420">Calda A (fosfatos + molibdato)</text>
  <text class="muted" x="504" y="442">Tabela: Insumos | Massa (kg) | N | P2O5 | K2O | Ca+ | Mg | SO4 | B | Zn | Cu | Mn | Mo | Fe | Co | Ni | Se | Si</text>
  <rect class="panel2" x="504" y="458" width="892" height="140" rx="10"/>
  <text class="mono" x="520" y="484">Fosfato Monoamônico Cristal (MAP Cristal)</text>
  <text class="mono" x="960" y="484">55.333 kg</text>
  <text class="mono" x="520" y="510">Molibdato de Amônio</text>
  <text class="mono" x="960" y="510">13.816 kg</text>
  <text class="mono" x="520" y="536">Água (Calda A)</text>
  <text class="mono" x="960" y="536">5.000 kg</text>
  <text class="muted" x="520" y="572">Contribuições principais (na fórmula final): P2O5 20.00% | Mo 4.33% | N 4.08% (incidental)</text>

  <rect class="panel2" x="484" y="624" width="912" height="220" rx="12"/>
  <text class="label" x="504" y="652">Calda B (magnésio + zinco)</text>
  <text class="muted" x="504" y="674">Tabela: Insumos | Massa (kg) | N | P2O5 | K2O | Ca+ | Mg | SO4 | B | Zn | Cu | Mn | Mo | Fe | Co | Ni | Se | Si</text>
  <rect class="panel2" x="504" y="690" width="892" height="140" rx="10"/>
  <text class="mono" x="520" y="716">Formiato de Magnésio</text>
  <text class="mono" x="960" y="716">75.312 kg</text>
  <text class="mono" x="520" y="742">Acetato de Zinco</text>
  <text class="mono" x="960" y="742">12.065 kg</text>
  <text class="mono" x="520" y="768">Água (Calda B)</text>
  <text class="mono" x="960" y="768">4.474 kg</text>
  <text class="muted" x="520" y="804">Contribuições principais (na fórmula final): Mg 7.259% | Zn 2.035%</text>

  <rect class="chip" x="484" y="856" width="912" height="20" rx="10"/>
  <text class="muted" x="504" y="870">Ressalvas: manter T ≥ 30°C no preparo, agitação constante, e não armazenar calda pronta por longos períodos.</text>
</svg>
