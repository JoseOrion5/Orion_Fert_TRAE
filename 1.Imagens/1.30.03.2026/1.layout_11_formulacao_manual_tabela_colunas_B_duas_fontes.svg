  <text class="label" x="820" y="366">Massa</text>
  <text class="label" x="900" y="366">N</text>
  <text class="label" x="950" y="366">P2O5</text>
  <text class="label" x="1014" y="366">K2O</text>
  <text class="label" x="1064" y="366">Ca+</text>
  <text class="label" x="1110" y="366">Mg</text>
  <text class="label" x="1148" y="366">SO4</text>
  <text class="label" x="1202" y="366">B</text>
  <text class="label" x="1240" y="366">Zn</text>
  <text class="label" x="1278" y="366">Cu</text>
  <text class="label" x="1316" y="366">Mn</text>
  <text class="label" x="1356" y="366">Mo</text>

