  <text class="mono" x="900" y="414">0.92</text>
  <text class="mono" x="950" y="414">5.02</text>
  <text class="mono" x="1202" y="414">0.00</text>

  <text class="mono" x="520" y="444">Uréia</text>
  <text class="mono" x="820" y="444">25.260</text>
  <text class="mono" x="900" y="444">9.08</text>

  <text class="mono" x="520" y="474">Ácido Bórico</text>
  <text class="mono" x="820" y="474">4.000</text>
  <text class="mono" x="1202" y="474">0.54</text>

  <text class="mono" x="520" y="504">Octaborato de Sódio</text>
  <text class="mono" x="820" y="504">6.000</text>
  <text class="mono" x="1202" y="504">0.96</text>

  <text class="mono" x="520" y="534">Água</text>
  <text class="mono" x="820" y="534">79.589</text>

  <rect class="chip" x="504" y="764" width="872" height="78" rx="10"/>
  <text class="label" x="520" y="792">Resumo e checagens</text>
  <text class="muted" x="520" y="814">- Soma alvos: N 10.00% | P2O5 5.0241% | B 1.50% | Q.S.P 100 L</text>
  <text class="muted" x="520" y="834">- Se houver ureia: sugerir NBPT (IN39) | - ordem de preparo e temperatura recomendadas</text>
