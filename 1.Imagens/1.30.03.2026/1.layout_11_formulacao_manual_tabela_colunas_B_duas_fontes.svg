  <text class="muted" x="80" y="714">Ex.: fontes de P2O5</text>
  <rect class="chip" x="80" y="732" width="340" height="34" rx="10"/>
  <rect class="chk_on" x="90" y="741" width="16" height="16" rx="3"/>
  <path class="chk_mark" d="M94 749 L97 753 L104 744"/>
  <text class="text" x="116" y="754">MAP Cristal</text>
