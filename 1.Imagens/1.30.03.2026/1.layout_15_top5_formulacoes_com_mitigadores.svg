<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg { fill: #0f1115; }
      .panel { fill: #151923; stroke: #2a3142; stroke-width: 1; }
      .panel2 { fill: #111522; stroke: #2a3142; stroke-width: 1; }
      .chip { fill: #1d2433; stroke: #2a3142; stroke-width: 1; }
      .tab { fill: #1a2130; stroke: #2a3142; stroke-width: 1; }
      .tab_on { fill: #16c6d4; }
      .btn2 { fill: #2a3142; }
      .title { fill: #d7dde8; font: 700 22px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #9aa6bd; font: 500 14px "Segoe UI", Arial, sans-serif; }
      .label { fill: #c2cbe0; font: 700 13px "Segoe UI", Arial, sans-serif; }
      .text { fill: #c2cbe0; font: 400 13px "Segoe UI", Arial, sans-serif; }
      .muted { fill: #8b95aa; font: 400 12px "Segoe UI", Arial, sans-serif; }
      .mono { fill: #c2cbe0; font: 500 11px "Consolas", "Segoe UI", monospace; }
      .accent { fill: #16c6d4; font: 800 26px "Segoe UI", Arial, sans-serif; }
      .pill_ok { fill: #143426; stroke: #2b6b4a; stroke-width: 1; }
      .pill_warn { fill: #3a2c12; stroke: #8b6a2b; stroke-width: 1; }
      .ok { fill: #41d18a; font: 800 12px "Segoe UI", Arial, sans-serif; }
      .warn { fill: #ffb020; font: 800 12px "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>

  <rect class="panel" x="24" y="20" width="1392" height="68" rx="12"/>
  <text class="accent" x="48" y="62">OrionAgroquim</text>
  <text class="subtitle" x="242" y="60">Top 5 formulações — tabela + processo + aditivos sugeridos</text>

  <rect class="panel" x="24" y="104" width="420" height="772" rx="12"/>
  <text class="title" x="48" y="146">Alvos e Condições</text>
  <text class="subtitle" x="48" y="170">Entradas fixas. Cada aba troca a formulação e os mitigadores.</text>

  <rect class="panel2" x="44" y="192" width="380" height="92" rx="10"/>
  <text class="label" x="60" y="220">Temperatura (°C)</text>
  <rect class="chip" x="60" y="232" width="130" height="34" rx="8"/>
  <text class="mono" x="74" y="254">25</text>
  <text class="label" x="212" y="220">Volume Q.S.P (L)</text>
  <rect class="chip" x="212" y="232" width="130" height="34" rx="8"/>
  <text class="mono" x="226" y="254">100</text>

  <rect class="panel2" x="44" y="300" width="380" height="246" rx="10"/>
  <text class="label" x="60" y="328">Nutrientes-alvo (%)</text>
  <rect class="chip" x="60" y="352" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="376">N</text>
  <rect class="panel2" x="105" y="360" width="120" height="22" rx="6"/>
  <text class="mono" x="116" y="376">10.00</text>
  <rect class="chip" x="60" y="398" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="422">P2O5</text>
  <rect class="panel2" x="105" y="406" width="120" height="22" rx="6"/>
  <text class="mono" x="116" y="422">5.0241</text>
  <rect class="chip" x="60" y="444" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="468">B</text>
  <rect class="panel2" x="105" y="452" width="120" height="22" rx="6"/>
  <text class="mono" x="116" y="468">1.50</text>

  <rect class="panel2" x="44" y="566" width="380" height="290" rx="10"/>
  <text class="label" x="60" y="594">Observações rápidas</text>
  <text class="muted" x="60" y="618">- B alto: dividir em 2 fontes pode ajudar</text>
  <text class="muted" x="60" y="640">- Se houver ureia: sugerir NBPT</text>
  <text class="muted" x="60" y="662">- Se Ca + P/SO4: ordem de preparo é crítica</text>
  <rect class="chip" x="60" y="690" width="340" height="46" rx="10"/>
  <text class="muted" x="76" y="718">Guia “FORMULAÇÃO MANUAL”</text>
  <rect class="chip" x="60" y="744" width="340" height="92" rx="10"/>
  <text class="muted" x="76" y="772">Na manual, a tabela recalcula</text>
  <text class="muted" x="76" y="794">a cada linha e mostra</text>
  <text class="muted" x="76" y="816">“atingido” e “faltam”.</text>

  <rect class="panel" x="464" y="104" width="952" height="772" rx="12"/>
  <text class="title" x="488" y="146">Top 5 formulações</text>
  <text class="subtitle" x="488" y="170">Cada aba inclui tabela + processo + aditivos sugeridos (IN39).</text>

  <rect class="panel2" x="484" y="192" width="912" height="52" rx="12"/>
  <rect class="tab_on" x="500" y="204" width="170" height="28" rx="14"/>
  <text class="label" x="526" y="224" fill="#071014">FORMULAÇÃO 1</text>
  <rect class="tab" x="678" y="204" width="170" height="28" rx="14"/>
  <text class="label" x="704" y="224">FORMULAÇÃO 2</text>
  <rect class="tab" x="856" y="204" width="170" height="28" rx="14"/>
  <text class="label" x="882" y="224">FORMULAÇÃO 3</text>
  <rect class="tab" x="1034" y="204" width="170" height="28" rx="14"/>
  <text class="label" x="1060" y="224">FORMULAÇÃO 4</text>
  <rect class="tab" x="1212" y="204" width="170" height="28" rx="14"/>
  <text class="label" x="1238" y="224">FORMULAÇÃO 5</text>

  <rect class="panel2" x="484" y="258" width="912" height="110" rx="12"/>
  <rect class="pill_ok" x="500" y="278" width="150" height="28" rx="14"/>
  <text class="ok" x="542" y="298">STATUS: OK</text>
  <text class="label" x="666" y="296">Formulação 1 — mais simples</text>
  <text class="muted" x="666" y="318">Sem divisão de B; foco em solúveis e preparo direto.</text>
  <rect class="btn2" x="1230" y="282" width="146" height="36" rx="10"/>
  <text class="label" x="1250" y="306">GERAR LAUDO</text>

  <rect class="panel2" x="484" y="384" width="560" height="492" rx="12"/>
  <text class="label" x="504" y="412">Tabela — insumo x nutrientes</text>
  <rect class="chip" x="504" y="430" width="520" height="34" rx="10"/>
  <text class="label" x="520" y="452">Insumo</text>
  <text class="label" x="770" y="452">Massa</text>
  <text class="label" x="850" y="452">N</text>
  <text class="label" x="900" y="452">P2O5</text>
  <text class="label" x="966" y="452">B</text>
  <rect class="panel2" x="504" y="472" width="520" height="220" rx="10"/>
  <text class="mono" x="520" y="500">MAP Cristal</text>
  <text class="mono" x="770" y="500">10.484</text>
  <text class="mono" x="850" y="500">0.92</text>
  <text class="mono" x="900" y="500">5.02</text>
  <text class="mono" x="966" y="500">0.00</text>
  <text class="mono" x="520" y="530">Uréia</text>
  <text class="mono" x="770" y="530">25.260</text>
  <text class="mono" x="850" y="530">9.08</text>
  <text class="mono" x="520" y="560">Ácido Bórico</text>
  <text class="mono" x="770" y="560">8.824</text>
  <text class="mono" x="966" y="560">1.50</text>
  <text class="mono" x="520" y="590">Água</text>
  <text class="mono" x="770" y="590">55.432</text>

  <rect class="chip" x="504" y="708" width="520" height="156" rx="10"/>
  <text class="label" x="520" y="736">Totais e faltas</text>
  <text class="muted" x="520" y="758">Atingido: N 10.00% | P2O5 5.0241% | B 1.50%</text>
  <text class="muted" x="520" y="780">Faltam: N 0.00% | P2O5 0.0000% | B 0.00%</text>
  <text class="muted" x="520" y="804">Checar solubilidade de B em T ambiente</text>
  <text class="muted" x="520" y="826">Se cristalizar: usar anticristalizante/dividir fonte</text>

  <rect class="panel2" x="1060" y="384" width="336" height="492" rx="12"/>
  <text class="label" x="1080" y="412">Processo e mitigadores</text>
  <text class="muted" x="1080" y="436">Ordem sugerida (exemplo):</text>
  <text class="muted" x="1080" y="458">1) água + estabilizante/anticristalizante</text>
  <text class="muted" x="1080" y="480">2) fontes de P (MAP/ácido)</text>
  <text class="muted" x="1080" y="502">3) fontes de N/K</text>
  <text class="muted" x="1080" y="524">4) B e micros (por último)</text>

  <rect class="chip" x="1080" y="546" width="296" height="1" rx="0"/>

  <text class="label" x="1080" y="574">Aditivos sugeridos (IN39)</text>
  <rect class="chip" x="1080" y="590" width="296" height="34" rx="10"/>
  <text class="text" x="1096" y="612">NBPT (inibidor de urease)</text>
  <rect class="chip" x="1080" y="630" width="296" height="34" rx="10"/>
  <text class="text" x="1096" y="652">Ácido Cítrico (ajuste pH/estabilidade)</text>
  <rect class="chip" x="1080" y="670" width="296" height="34" rx="10"/>
  <text class="text" x="1096" y="692">Glicerina / Polióis (anticristalizante)</text>
  <rect class="chip" x="1080" y="710" width="296" height="34" rx="10"/>
  <text class="text" x="1096" y="732">Sorbitol (melhora Ca/B foliar)</text>
  <rect class="pill_warn" x="1080" y="754" width="156" height="26" rx="13"/>
  <text class="warn" x="1106" y="772">ATENÇÃO</text>
  <text class="muted" x="1080" y="796">Não misturar bases fortes com ácidos.</text>
  <text class="muted" x="1080" y="818">Monitorar pH e compatibilidade.</text>
  <text class="muted" x="1080" y="840">Reavaliar a 20°C (cristalização).</text>
</svg>
