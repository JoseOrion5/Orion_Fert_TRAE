<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg { fill: #0f1115; }
      .panel { fill: #151923; stroke: #2a3142; stroke-width: 1; }
      .panel2 { fill: #111522; stroke: #2a3142; stroke-width: 1; }
      .chip { fill: #1d2433; stroke: #2a3142; stroke-width: 1; }
      .tab { fill: #1a2130; stroke: #2a3142; stroke-width: 1; }
      .tab_on { fill: #16c6d4; }
      .btn { fill: #16c6d4; }
      .btn2 { fill: #2a3142; }
      .title { fill: #d7dde8; font: 700 22px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #9aa6bd; font: 500 14px "Segoe UI", Arial, sans-serif; }
      .label { fill: #c2cbe0; font: 700 13px "Segoe UI", Arial, sans-serif; }
      .text { fill: #c2cbe0; font: 400 13px "Segoe UI", Arial, sans-serif; }
      .muted { fill: #8b95aa; font: 400 12px "Segoe UI", Arial, sans-serif; }
      .mono { fill: #c2cbe0; font: 500 11px "Consolas", "Segoe UI", monospace; }
      .accent { fill: #16c6d4; font: 800 26px "Segoe UI", Arial, sans-serif; }
      .chk { fill: #0e1320; stroke: #2a3142; stroke-width: 1; }
      .chk_on { fill: #0d2b2e; stroke: #16c6d4; stroke-width: 1; }
      .chk_mark { fill: none; stroke: #d7dde8; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .pill_ok { fill: #143426; stroke: #2b6b4a; stroke-width: 1; }
      .pill_warn { fill: #3a2c12; stroke: #8b6a2b; stroke-width: 1; }
      .ok { fill: #41d18a; font: 800 12px "Segoe UI", Arial, sans-serif; }
      .warn { fill: #ffb020; font: 800 12px "Segoe UI", Arial, sans-serif; }
      .danger { fill: #ff5a70; font: 800 12px "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>

  <rect class="panel" x="24" y="20" width="1392" height="68" rx="12"/>
  <text class="accent" x="48" y="62">OrionAgroquim</text>
  <text class="subtitle" x="242" y="60">Formulação Manual — você preenche e a tabela é recalculada a cada adição</text>

  <rect class="panel" x="24" y="104" width="1392" height="772" rx="12"/>

  <rect class="panel2" x="44" y="124" width="1352" height="54" rx="12"/>
  <rect class="tab" x="60" y="136" width="210" height="30" rx="15"/>
  <text class="label" x="118" y="157">PRINCIPAL</text>
  <rect class="tab" x="278" y="136" width="240" height="30" rx="15"/>
  <text class="label" x="336" y="157">TOP 5 FORMAS</text>
  <rect class="tab_on" x="526" y="136" width="280" height="30" rx="15"/>
  <text class="label" x="566" y="157" fill="#071014">FORMULAÇÃO MANUAL</text>
  <rect class="tab" x="814" y="136" width="160" height="30" rx="15"/>
  <text class="label" x="866" y="157">LAUDO</text>

  <rect class="panel" x="44" y="192" width="460" height="664" rx="12"/>
  <text class="title" x="68" y="232">Entrada (passo a passo)</text>
  <text class="subtitle" x="68" y="256">Escolha nutriente → escolha insumo → informe % alvo → adiciona linha.</text>

  <rect class="panel2" x="64" y="276" width="420" height="140" rx="10"/>
  <text class="label" x="80" y="306">1) Nutrientes (flags)</text>
  <rect class="chip" x="80" y="324" width="196" height="30" rx="10"/>
  <rect class="chk_on" x="90" y="331" width="16" height="16" rx="3"/>
  <path class="chk_mark" d="M94 339 L97 343 L104 334"/>
  <text class="text" x="116" y="345">P2O5</text>
  <rect class="chip" x="288" y="324" width="196" height="30" rx="10"/>
  <rect class="chk_on" x="298" y="331" width="16" height="16" rx="3"/>
  <path class="chk_mark" d="M302 339 L305 343 L312 334"/>
  <text class="text" x="324" y="345">B</text>
  <rect class="chip" x="80" y="362" width="196" height="30" rx="10"/>
  <rect class="chk" x="90" y="369" width="16" height="16" rx="3"/>
  <text class="text" x="116" y="383">N</text>
  <rect class="chip" x="288" y="362" width="196" height="30" rx="10"/>
  <rect class="chk" x="298" y="369" width="16" height="16" rx="3"/>
  <text class="text" x="324" y="383">K2O</text>

  <rect class="panel2" x="64" y="430" width="420" height="176" rx="10"/>
  <text class="label" x="80" y="460">2) Insumo do nutriente ativo</text>
  <rect class="chip" x="80" y="478" width="420" height="34" rx="10"/>
  <text class="label" x="96" y="500">Nutriente ativo:</text>
  <text class="text" x="212" y="500">B</text>
  <rect class="chip" x="80" y="520" width="420" height="34" rx="10"/>
  <text class="label" x="96" y="542">Insumo:</text>
  <text class="text" x="170" y="542">Ácido Bórico</text>
  <rect class="chip" x="80" y="562" width="420" height="34" rx="10"/>
  <text class="muted" x="96" y="584">Alternativas: Octaborato de Sódio, Borato de monoetanolamina...</text>

  <rect class="panel2" x="64" y="620" width="420" height="236" rx="10"/>
  <text class="label" x="80" y="650">3) Meta (%) e inclusão</text>
  <rect class="chip" x="80" y="668" width="420" height="40" rx="10"/>
  <text class="label" x="96" y="694">Meta do nutriente (B %)</text>
  <rect class="panel2" x="280" y="676" width="90" height="24" rx="6"/>
  <text class="mono" x="292" y="694">0.54</text>
  <text class="muted" x="378" y="694">%</text>
  <rect class="btn2" x="80" y="718" width="200" height="44" rx="12"/>
  <text class="label" x="118" y="746">ADICIONAR LINHA</text>
  <rect class="btn" x="300" y="718" width="200" height="44" rx="12"/>
  <text class="label" x="336" y="746" fill="#071014">RECALCULAR</text>
  <rect class="chip" x="80" y="772" width="420" height="70" rx="10"/>
  <text class="muted" x="96" y="798">A cada inclusão:</text>
  <text class="muted" x="96" y="820">- recalcula massa do insumo</text>
  <text class="muted" x="96" y="842">- atualiza totais e “faltam”</text>

  <rect class="panel" x="524" y="192" width="872" height="664" rx="12"/>
  <text class="title" x="548" y="232">Tabela dinâmica (recalcula conforme você preenche)</text>
  <text class="subtitle" x="548" y="256">Cada linha mostra o que o insumo gera. Totais e “faltam” atualizam em tempo real.</text>

  <rect class="panel2" x="544" y="276" width="832" height="72" rx="12"/>
  <rect class="pill_ok" x="560" y="292" width="140" height="28" rx="14"/>
  <text class="ok" x="598" y="312">AUTOCÁLCULO</text>
  <text class="muted" x="716" y="310">Recalcula ao adicionar/editar/remover linha</text>
  <rect class="btn2" x="1230" y="286" width="146" height="36" rx="10"/>
  <text class="label" x="1250" y="310">GERAR LAUDO</text>

  <rect class="chip" x="544" y="362" width="832" height="34" rx="10"/>
  <text class="label" x="560" y="384">Insumo</text>
  <text class="label" x="820" y="384">Massa</text>
  <text class="label" x="900" y="384">N</text>
  <text class="label" x="950" y="384">P2O5</text>
  <text class="label" x="1014" y="384">K2O</text>
  <text class="label" x="1064" y="384">Ca+</text>
  <text class="label" x="1110" y="384">Mg</text>
  <text class="label" x="1148" y="384">SO4</text>
  <text class="label" x="1202" y="384">B</text>
  <text class="label" x="1240" y="384">Zn</text>
  <text class="label" x="1278" y="384">Cu</text>
  <text class="label" x="1316" y="384">Mn</text>
  <text class="label" x="1356" y="384">Mo</text>

  <rect class="panel2" x="544" y="406" width="832" height="284" rx="10"/>
  <text class="mono" x="560" y="432">MAP Cristal</text>
  <text class="mono" x="820" y="432">10.484</text>
  <text class="mono" x="900" y="432">0.92</text>
  <text class="mono" x="950" y="432">5.02</text>
  <text class="mono" x="1202" y="432">0.00</text>
  <text class="mono" x="560" y="462">Uréia</text>
  <text class="mono" x="820" y="462">25.260</text>
  <text class="mono" x="900" y="462">9.08</text>
  <text class="mono" x="560" y="492">Ácido Bórico</text>
  <text class="mono" x="820" y="492">4.000</text>
  <text class="mono" x="1202" y="492">0.54</text>
  <text class="mono" x="560" y="522">Octaborato de Sódio</text>
  <text class="mono" x="820" y="522">6.000</text>
  <text class="mono" x="1202" y="522">0.96</text>
  <text class="mono" x="560" y="552">Água</text>
  <text class="mono" x="820" y="552">79.589</text>

  <rect class="chip" x="544" y="706" width="832" height="64" rx="10"/>
  <text class="label" x="560" y="734">Totais (atingido)</text>
  <text class="mono" x="560" y="756">N 10.00% | P2O5 5.0241% | B 1.50%</text>
  <rect class="chip" x="544" y="780" width="832" height="64" rx="10"/>
  <text class="label" x="560" y="808">Faltam (para o alvo)</text>
  <text class="mono" x="560" y="830">N 0.00% | P2O5 0.0000% | B 0.00%</text>
</svg>
