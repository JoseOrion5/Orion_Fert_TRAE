<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg { fill: #0f1115; }
      .panel { fill: #151923; stroke: #2a3142; stroke-width: 1; }
      .panel2 { fill: #111522; stroke: #2a3142; stroke-width: 1; }
      .chip { fill: #1d2433; stroke: #2a3142; stroke-width: 1; }
      .btn { fill: #16c6d4; }
      .btn2 { fill: #2a3142; }
      .title { fill: #d7dde8; font: 700 22px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #9aa6bd; font: 500 14px "Segoe UI", Arial, sans-serif; }
      .label { fill: #c2cbe0; font: 700 13px "Segoe UI", Arial, sans-serif; }
      .text { fill: #c2cbe0; font: 400 13px "Segoe UI", Arial, sans-serif; }
      .muted { fill: #8b95aa; font: 400 12px "Segoe UI", Arial, sans-serif; }
      .mono { fill: #c2cbe0; font: 500 12px "Consolas", "Segoe UI", monospace; }
      .accent { fill: #16c6d4; font: 700 18px "Segoe UI", Arial, sans-serif; }
      .toggle_track_off { fill: #0e1320; stroke: #2a3142; stroke-width: 1; }
      .toggle_track_on { fill: #0d2b2e; stroke: #16c6d4; stroke-width: 1; }
      .toggle_knob { fill: #d7dde8; }
      .badge { fill: #143426; stroke: #2b6b4a; stroke-width: 1; }
      .badge_text { fill: #41d18a; font: 700 12px "Segoe UI", Arial, sans-serif; }
      .danger_badge { fill: #3b171d; stroke: #8b2b3c; stroke-width: 1; }
      .danger_text { fill: #ff5a70; font: 700 12px "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>

  <rect class="panel" x="24" y="20" width="1392" height="68" rx="12"/>
  <text class="accent" x="48" y="60">OrionAgroquim</text>
  <text class="subtitle" x="192" y="60">Simulador de Formulação IN39 (Q.S.P 100 L)</text>
  <rect class="chip" x="1080" y="34" width="150" height="40" rx="10"/>
  <text class="label" x="1098" y="59">Modo</text>
  <text class="text" x="1145" y="59">Dark</text>
  <rect class="chip" x="1246" y="34" width="150" height="40" rx="10"/>
  <text class="label" x="1264" y="59">Base</text>
  <text class="text" x="1310" y="59">IN39</text>

  <rect class="panel" x="24" y="104" width="480" height="772" rx="12"/>
  <text class="title" x="48" y="146">Alvos e Condições</text>
  <text class="subtitle" x="48" y="170">Informe os nutrientes-alvo. Ajuste o motor se quiser.</text>

  <rect class="panel2" x="44" y="192" width="440" height="78" rx="10"/>
  <text class="label" x="60" y="220">Temperatura (°C)</text>
  <rect class="chip" x="60" y="232" width="130" height="34" rx="8"/>
  <text class="mono" x="74" y="254">25</text>
  <text class="label" x="212" y="220">Volume Q.S.P (L)</text>
  <rect class="chip" x="212" y="232" width="130" height="34" rx="8"/>
  <text class="mono" x="226" y="254">100</text>

  <rect class="panel2" x="44" y="286" width="440" height="332" rx="10"/>
  <text class="label" x="60" y="314">Nutrientes-alvo (%)</text>
  <text class="muted" x="60" y="336">Selecione e preencha: macro e micro.</text>
  <rect class="chip" x="60" y="354" width="408" height="38" rx="10"/>
  <text class="label" x="74" y="378">N</text>
  <rect class="panel2" x="105" y="362" width="92" height="22" rx="6"/>
  <text class="mono" x="116" y="378">4.00</text>
  <rect class="chip" x="60" y="400" width="408" height="38" rx="10"/>
  <text class="label" x="74" y="424">P2O5</text>
  <rect class="panel2" x="105" y="408" width="92" height="22" rx="6"/>
  <text class="mono" x="116" y="424">6.00</text>
  <rect class="chip" x="60" y="446" width="408" height="38" rx="10"/>
  <text class="label" x="74" y="470">K2O</text>
  <rect class="panel2" x="105" y="454" width="92" height="22" rx="6"/>
  <text class="mono" x="116" y="470">8.00</text>
  <rect class="chip" x="60" y="492" width="408" height="38" rx="10"/>
  <text class="label" x="74" y="516">Ca</text>
  <rect class="panel2" x="105" y="500" width="92" height="22" rx="6"/>
  <text class="mono" x="116" y="516">1.00</text>
  <rect class="chip" x="60" y="538" width="408" height="38" rx="10"/>
  <text class="label" x="74" y="562">Zn</text>
  <rect class="panel2" x="105" y="546" width="92" height="22" rx="6"/>
  <text class="mono" x="116" y="562">0.10</text>
  <text class="muted" x="60" y="602">Outros: Mg, S, Cu, Mn, Mo, Fe...</text>

  <rect class="panel2" x="44" y="632" width="440" height="176" rx="10"/>
  <text class="label" x="60" y="660">Motor de Cálculo</text>
  <text class="muted" x="60" y="682">Liga/desliga recursos. Só funciona se a biblioteca estiver instalada.</text>

  <rect class="chip" x="60" y="698" width="408" height="36" rx="10"/>
  <text class="label" x="74" y="722">Cálculo base (numpy)</text>
  <rect class="toggle_track_on" x="408" y="704" width="52" height="22" rx="11"/>
  <circle class="toggle_knob" cx="449" cy="715" r="8"/>

  <rect class="chip" x="60" y="740" width="408" height="36" rx="10"/>
  <text class="label" x="74" y="764">Leitura CSV (pandas)</text>
  <rect class="toggle_track_on" x="408" y="746" width="52" height="22" rx="11"/>
  <circle class="toggle_knob" cx="449" cy="757" r="8"/>

  <rect class="chip" x="60" y="782" width="408" height="36" rx="10"/>
  <text class="label" x="74" y="806">Otimização (scipy)</text>
  <rect class="toggle_track_off" x="408" y="788" width="52" height="22" rx="11"/>
  <circle class="toggle_knob" cx="419" cy="799" r="8"/>

  <rect class="btn" x="44" y="820" width="440" height="52" rx="12"/>
  <text class="label" x="208" y="853" fill="#071014">CALCULAR FORMAS</text>

  <rect class="panel" x="524" y="104" width="892" height="772" rx="12"/>
  <text class="title" x="548" y="146">Formas de Atingir os Alvos</text>
  <text class="subtitle" x="548" y="170">Resultados mudam conforme o motor (otimização/validação/unidades).</text>

  <rect class="panel2" x="544" y="192" width="852" height="138" rx="12"/>
  <text class="label" x="564" y="222">Resumo</text>
  <text class="text" x="564" y="246">Receita sugerida para 100 L, com densidade estimada e status.</text>
  <rect class="badge" x="564" y="260" width="130" height="28" rx="14"/>
  <text class="badge_text" x="588" y="279">Status: OK</text>
  <rect class="chip" x="710" y="260" width="196" height="28" rx="14"/>
  <text class="muted" x="724" y="279">Densidade: 1.18 kg/L</text>
  <rect class="danger_badge" x="916" y="260" width="220" height="28" rx="14"/>
  <text class="danger_text" x="936" y="279">scipy desligado</text>
  <text class="muted" x="564" y="308">Modo sem otimização: usa regras/ranking simples.</text>

  <rect class="panel2" x="544" y="346" width="852" height="530" rx="12"/>
  <text class="label" x="564" y="378">Receita (100 L)</text>
  <rect class="chip" x="564" y="392" width="812" height="34" rx="10"/>
  <text class="label" x="580" y="414">Insumo</text>
  <text class="label" x="1160" y="414">Massa (kg)</text>
  <text class="label" x="1284" y="414">Obs</text>
  <rect class="panel2" x="564" y="438" width="812" height="390" rx="10"/>
  <text class="mono" x="580" y="468">MAP (Fosfato Monoamônico)</text>
  <text class="mono" x="1160" y="468">12.430</text>
  <text class="mono" x="1284" y="468">P2O5 + N</text>
  <text class="mono" x="580" y="496">Nitrato de Potássio</text>
  <text class="mono" x="1160" y="496">14.200</text>
  <text class="mono" x="1284" y="496">K2O + N</text>
  <text class="mono" x="580" y="524">Cloreto de Cálcio</text>
  <text class="mono" x="1160" y="524">2.840</text>
  <text class="mono" x="1284" y="524">Ca</text>
  <text class="muted" x="580" y="566">Observações: ordem de dissolução recomendada; evitar mistura direta Ca + fosfato.</text>

  <rect class="btn2" x="1200" y="356" width="176" height="40" rx="12"/>
  <text class="label" x="1224" y="382">AJUSTAR MOTOR</text>
</svg>
