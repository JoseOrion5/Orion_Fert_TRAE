<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg { fill: #0f1115; }
      .panel { fill: #151923; stroke: #2a3142; stroke-width: 1; }
      .panel2 { fill: #111522; stroke: #2a3142; stroke-width: 1; }
      .chip { fill: #1d2433; stroke: #2a3142; stroke-width: 1; }
      .btn { fill: #16c6d4; }
      .btn2 { fill: #2a3142; }
      .title { fill: #d7dde8; font: 700 22px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #9aa6bd; font: 500 14px "Segoe UI", Arial, sans-serif; }
      .label { fill: #c2cbe0; font: 600 13px "Segoe UI", Arial, sans-serif; }
      .text { fill: #c2cbe0; font: 400 13px "Segoe UI", Arial, sans-serif; }
      .muted { fill: #8b95aa; font: 400 12px "Segoe UI", Arial, sans-serif; }
      .mono { fill: #c2cbe0; font: 500 12px "Consolas", "Segoe UI", monospace; }
      .accent { fill: #16c6d4; font: 700 18px "Segoe UI", Arial, sans-serif; }
      .warn { fill: #ffb020; font: 600 12px "Segoe UI", Arial, sans-serif; }
      .ok { fill: #41d18a; font: 600 12px "Segoe UI", Arial, sans-serif; }
      .danger { fill: #ff5a70; font: 600 12px "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>

  <rect class="panel" x="24" y="20" width="1392" height="68" rx="12"/>
  <text class="accent" x="48" y="60">OrionAgroquim</text>
  <text class="subtitle" x="192" y="60">Simulador de Formulação IN39 (Q.S.P 100 L)</text>
  <rect class="chip" x="1080" y="34" width="150" height="40" rx="10"/>
  <text class="label" x="1098" y="59">Modo</text>
  <text class="text" x="1145" y="59">Dark</text>
  <rect class="chip" x="1246" y="34" width="150" height="40" rx="10"/>
  <text class="label" x="1264" y="59">Base</text>
  <text class="text" x="1310" y="59">IN39</text>

  <rect class="panel" x="24" y="104" width="420" height="772" rx="12"/>
  <text class="title" x="48" y="146">Alvos e Condições</text>
  <text class="subtitle" x="48" y="170">Informe apenas os nutrientes-alvo. O sistema propõe formas de atingir.</text>

  <rect class="panel2" x="44" y="192" width="380" height="90" rx="10"/>
  <text class="label" x="60" y="220">Temperatura (°C)</text>
  <rect class="chip" x="60" y="232" width="130" height="34" rx="8"/>
  <text class="mono" x="74" y="254">25</text>
  <text class="label" x="212" y="220">Volume Q.S.P (L)</text>
  <rect class="chip" x="212" y="232" width="130" height="34" rx="8"/>
  <text class="mono" x="226" y="254">100</text>

  <rect class="panel2" x="44" y="298" width="380" height="410" rx="10"/>
  <text class="label" x="60" y="326">Nutrientes-alvo (%)</text>
  <text class="muted" x="60" y="348">Selecione e preencha: macro e micro.</text>

  <rect class="chip" x="60" y="368" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="392">N</text>
  <rect class="panel2" x="105" y="376" width="92" height="22" rx="6"/>
  <text class="mono" x="116" y="392">4.00</text>
  <text class="muted" x="212" y="392">%</text>

  <rect class="chip" x="60" y="414" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="438">P2O5</text>
  <rect class="panel2" x="105" y="422" width="92" height="22" rx="6"/>
  <text class="mono" x="116" y="438">6.00</text>
  <text class="muted" x="212" y="438">%</text>

  <rect class="chip" x="60" y="460" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="484">K2O</text>
  <rect class="panel2" x="105" y="468" width="92" height="22" rx="6"/>
  <text class="mono" x="116" y="484">8.00</text>
  <text class="muted" x="212" y="484">%</text>

  <rect class="chip" x="60" y="506" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="530">Ca</text>
  <rect class="panel2" x="105" y="514" width="92" height="22" rx="6"/>
  <text class="mono" x="116" y="530">1.00</text>
  <text class="muted" x="212" y="530">%</text>

  <rect class="chip" x="60" y="552" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="576">Zn</text>
  <rect class="panel2" x="105" y="560" width="92" height="22" rx="6"/>
  <text class="mono" x="116" y="576">0.10</text>
  <text class="muted" x="212" y="576">%</text>

  <rect class="chip" x="60" y="598" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="622">B</text>
  <rect class="panel2" x="105" y="606" width="92" height="22" rx="6"/>
  <text class="mono" x="116" y="622">0.05</text>
  <text class="muted" x="212" y="622">%</text>

  <text class="muted" x="60" y="676">Outros: Mg, S, Cu, Mn, Mo, Fe...</text>

  <rect class="btn" x="44" y="728" width="380" height="52" rx="12"/>
  <text class="label" x="182" y="761" fill="#071014">CALCULAR FORMAS</text>
  <text class="muted" x="48" y="814">Ao calcular: consulta toda a base IN39 e sugere receitas + mitigadores.</text>

  <rect class="panel" x="464" y="104" width="952" height="772" rx="12"/>
  <text class="title" x="488" y="146">Formas de Atingir os Alvos</text>
  <text class="subtitle" x="488" y="170">Receitas candidatas, riscos físico-químicos, mitigadores (temperatura e aditivos IN39).</text>

  <rect class="panel2" x="484" y="192" width="912" height="170" rx="12"/>
  <text class="label" x="504" y="222">Resumo</text>
  <text class="text" x="504" y="246">Receita sugerida para 100 L, com densidade estimada e status de solubilidade.</text>
  <text class="ok" x="504" y="270">Status: SOLUÇÃO (ok)</text>
  <text class="text" x="664" y="270">Densidade: 1.18 kg/L</text>
  <text class="muted" x="504" y="298">Opções adicionais aparecem se houver saturação, risco de cristalização ou incompatibilidades.</text>
  <rect class="btn2" x="1224" y="214" width="152" height="36" rx="10"/>
  <text class="label" x="1245" y="238">GERAR LAUDO</text>

  <rect class="panel2" x="484" y="376" width="570" height="500" rx="12"/>
  <text class="label" x="504" y="406">Receita (100 L)</text>
  <rect class="chip" x="504" y="422" width="530" height="34" rx="10"/>
  <text class="label" x="520" y="444">Insumo</text>
  <text class="label" x="900" y="444">Massa (kg)</text>
  <text class="label" x="980" y="444">Observação</text>

  <rect class="panel2" x="504" y="468" width="530" height="330" rx="10"/>
  <text class="mono" x="520" y="498">MAP (Fosfato Monoamônico)</text>
  <text class="mono" x="900" y="498">12.430</text>
  <text class="mono" x="980" y="498">P2O5 + N</text>
  <text class="mono" x="520" y="526">Nitrato de Potássio</text>
  <text class="mono" x="900" y="526">14.200</text>
  <text class="mono" x="980" y="526">K2O + N</text>
  <text class="mono" x="520" y="554">Cloreto de Cálcio</text>
  <text class="mono" x="900" y="554">2.100</text>
  <text class="mono" x="980" y="554">Ca</text>
  <text class="mono" x="520" y="582">Sulfato de Zinco</text>
  <text class="mono" x="900" y="582">0.180</text>
  <text class="mono" x="980" y="582">Zn</text>
  <text class="mono" x="520" y="610">Água</text>
  <text class="mono" x="900" y="610">88.950</text>
  <text class="mono" x="980" y="610">Q.S.P</text>

  <rect class="chip" x="504" y="814" width="530" height="44" rx="10"/>
  <text class="text" x="520" y="842">Notas: ordem de dissolução e recomendações aparecem em “Dicas do Especialista”.</text>

  <rect class="panel2" x="1070" y="376" width="326" height="500" rx="12"/>
  <text class="label" x="1090" y="406">Dicas do Especialista</text>
  <rect class="panel2" x="1090" y="422" width="286" height="436" rx="10"/>
  <text class="warn" x="1108" y="452">Risco: Ca + P (precipitação)</text>
  <text class="text" x="1108" y="476">Mitigador: sugerir EDTA (pH 4.0–7.0)</text>
  <text class="text" x="1108" y="500">Mitigador: reduzir T de preparo e diluir</text>
  <text class="warn" x="1108" y="534">Risco: cristalização por densidade alta</text>
  <text class="text" x="1108" y="558">Mitigador: anticristalizante IN39 compatível</text>
  <text class="muted" x="1108" y="602">O painel lista:</text>
  <text class="muted" x="1108" y="624">- 2–3 receitas candidatas</text>
  <text class="muted" x="1108" y="646">- riscos + justificativas</text>
  <text class="muted" x="1108" y="668">- ações: T, aditivos, troca de fonte</text>
</svg>
