<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg { fill: #0f1115; }
      .panel { fill: #151923; stroke: #2a3142; stroke-width: 1; }
      .panel2 { fill: #111522; stroke: #2a3142; stroke-width: 1; }
      .chip { fill: #1d2433; stroke: #2a3142; stroke-width: 1; }
      .tab { fill: #1a2130; stroke: #2a3142; stroke-width: 1; }
      .tab_on { fill: #16c6d4; }
      .btn { fill: #16c6d4; }
      .btn2 { fill: #2a3142; }
      .title { fill: #d7dde8; font: 700 22px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #9aa6bd; font: 500 14px "Segoe UI", Arial, sans-serif; }
      .label { fill: #c2cbe0; font: 700 13px "Segoe UI", Arial, sans-serif; }
      .text { fill: #c2cbe0; font: 400 13px "Segoe UI", Arial, sans-serif; }
      .muted { fill: #8b95aa; font: 400 12px "Segoe UI", Arial, sans-serif; }
      .mono { fill: #c2cbe0; font: 500 12px "Consolas", "Segoe UI", monospace; }
      .accent { fill: #16c6d4; font: 800 26px "Segoe UI", Arial, sans-serif; }
      .pill_ok { fill: #143426; stroke: #2b6b4a; stroke-width: 1; }
      .pill_warn { fill: #3a2c12; stroke: #8b6a2b; stroke-width: 1; }
      .pill_bad { fill: #3b171d; stroke: #8b2b3c; stroke-width: 1; }
      .ok { fill: #41d18a; font: 700 12px "Segoe UI", Arial, sans-serif; }
      .warn { fill: #ffb020; font: 700 12px "Segoe UI", Arial, sans-serif; }
      .danger { fill: #ff5a70; font: 700 12px "Segoe UI", Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>

  <rect class="panel" x="24" y="20" width="1392" height="68" rx="12"/>
  <text class="accent" x="48" y="62">OrionAgroquim</text>
  <text class="subtitle" x="242" y="60">Top 5 formas de atingir os alvos (da mais simples à mais rebuscada)</text>
  <rect class="chip" x="1160" y="34" width="110" height="40" rx="10"/>
  <text class="label" x="1178" y="59">Modo</text>
  <text class="text" x="1226" y="59">Dark</text>
  <rect class="chip" x="1286" y="34" width="110" height="40" rx="10"/>
  <text class="label" x="1304" y="59">Base</text>
  <text class="text" x="1348" y="59">IN39</text>

  <rect class="panel" x="24" y="104" width="420" height="772" rx="12"/>
  <text class="title" x="48" y="146">Alvos e Condições</text>
  <text class="subtitle" x="48" y="170">Informe apenas os alvos. O sistema gera 5 caminhos viáveis.</text>

  <rect class="panel2" x="44" y="192" width="380" height="92" rx="10"/>
  <text class="label" x="60" y="220">Temperatura (°C)</text>
  <rect class="chip" x="60" y="232" width="130" height="34" rx="8"/>
  <text class="mono" x="74" y="254">25</text>
  <text class="label" x="212" y="220">Volume Q.S.P (L)</text>
  <rect class="chip" x="212" y="232" width="130" height="34" rx="8"/>
  <text class="mono" x="226" y="254">100</text>

  <rect class="panel2" x="44" y="300" width="380" height="410" rx="10"/>
  <text class="label" x="60" y="328">Nutrientes-alvo (%)</text>
  <text class="muted" x="60" y="350">Macro e micro (ex.: N, P2O5, K2O, Ca, Mg, S, B, Zn...).</text>

  <rect class="chip" x="60" y="370" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="394">N</text>
  <rect class="panel2" x="105" y="378" width="110" height="22" rx="6"/>
  <text class="mono" x="116" y="394">30.00</text>
  <text class="muted" x="226" y="394">%</text>

  <rect class="chip" x="60" y="416" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="440">K2O</text>
  <rect class="panel2" x="105" y="424" width="110" height="22" rx="6"/>
  <text class="mono" x="116" y="440">10.00</text>
  <text class="muted" x="226" y="440">%</text>

  <rect class="chip" x="60" y="462" width="340" height="38" rx="10"/>
  <text class="label" x="74" y="486">S</text>
  <rect class="panel2" x="105" y="470" width="110" height="22" rx="6"/>
  <text class="mono" x="116" y="486">2.32</text>
  <text class="muted" x="226" y="486">%</text>

  <text class="muted" x="60" y="548">O sistema prioriza soluções que:</text>
  <text class="muted" x="60" y="570">1) dissolvem em 25°C</text>
  <text class="muted" x="60" y="592">2) não precipitam (Ca+P, Ca+S...)</text>
  <text class="muted" x="60" y="614">3) minimizam riscos (cristalização, volatilização etc.)</text>

  <rect class="btn" x="44" y="728" width="380" height="52" rx="12"/>
  <text class="label" x="170" y="761" fill="#071014">CALCULAR TOP 5</text>

  <rect class="panel" x="464" y="104" width="952" height="772" rx="12"/>
  <text class="title" x="488" y="146">Formas de Atingir (Top 5)</text>
  <text class="subtitle" x="488" y="170">Aba 1 é a mais simples/viável; Aba 5 é a mais “rebuscada”.</text>

  <rect class="panel2" x="484" y="192" width="912" height="52" rx="12"/>
  <rect class="tab_on" x="500" y="204" width="160" height="28" rx="14"/>
  <text class="label" x="546" y="224" fill="#071014">FORMA 1</text>
  <rect class="tab" x="668" y="204" width="160" height="28" rx="14"/>
  <text class="label" x="714" y="224">FORMA 2</text>
  <rect class="tab" x="836" y="204" width="160" height="28" rx="14"/>
  <text class="label" x="882" y="224">FORMA 3</text>
  <rect class="tab" x="1004" y="204" width="160" height="28" rx="14"/>
  <text class="label" x="1050" y="224">FORMA 4</text>
  <rect class="tab" x="1172" y="204" width="160" height="28" rx="14"/>
  <text class="label" x="1218" y="224">FORMA 5</text>

  <rect class="panel2" x="484" y="258" width="912" height="160" rx="12"/>
  <rect class="pill_ok" x="500" y="278" width="120" height="28" rx="14"/>
  <text class="ok" x="532" y="298">SIMPLES</text>
  <text class="label" x="636" y="296">Receita direta (mínimo de aditivos)</text>
  <text class="muted" x="636" y="318">Melhor para preparo em temperatura ambiente e menor risco operacional.</text>
  <text class="text" x="500" y="352">Resumo:</text>
  <text class="mono" x="560" y="352">Status ok | Densidade 1.18 kg/L | T ≥ 20°C | Q.S.P 100 L</text>
  <text class="text" x="500" y="376">Receita:</text>
  <text class="mono" x="560" y="376">Nitrato de Amônio + Nitrato de Potássio + Fonte de S solúvel + Água</text>
  <rect class="btn2" x="1230" y="286" width="146" height="36" rx="10"/>
  <text class="label" x="1250" y="310">GERAR LAUDO</text>

  <rect class="panel2" x="484" y="432" width="570" height="444" rx="12"/>
  <text class="label" x="504" y="460">Ressalvas (temperatura e aditivos)</text>
  <rect class="chip" x="504" y="476" width="530" height="50" rx="10"/>
  <text class="warn" x="520" y="506">Risco: cristalização (moderado)</text>
  <text class="muted" x="520" y="524">Ação: manter T de preparo ≥ 20°C e agitação constante.</text>

  <rect class="chip" x="504" y="536" width="530" height="50" rx="10"/>
  <text class="muted" x="520" y="566">Aditivos: nenhum obrigatório nesta forma.</text>
  <text class="muted" x="520" y="584">Se necessário: anticristalizante IN39 (dose baixa) como mitigador.</text>

  <rect class="chip" x="504" y="596" width="530" height="80" rx="10"/>
  <text class="muted" x="520" y="626">Ordem de preparo:</text>
  <text class="muted" x="520" y="648">1) água + parte do nitrato</text>
  <text class="muted" x="520" y="670">2) completar sais por ordem de solubilidade</text>

  <rect class="panel2" x="1070" y="432" width="326" height="444" rx="12"/>
  <text class="label" x="1090" y="460">Resumo Técnico</text>
  <rect class="panel2" x="1090" y="476" width="286" height="386" rx="10"/>
  <text class="muted" x="1108" y="506">O que esta aba mostra:</text>
  <text class="muted" x="1108" y="528">- Uma receita candidata</text>
  <text class="muted" x="1108" y="550">- Riscos e justificativa</text>
  <text class="muted" x="1108" y="572">- Mitigadores: T e aditivos IN39</text>
  <text class="muted" x="1108" y="594">- Complexidade (simples → rebuscada)</text>
  <text class="muted" x="1108" y="640">Forma 2 pode exigir</text>
  <text class="muted" x="1108" y="662">quelante/estabilizante</text>
  <text class="muted" x="1108" y="684">Forma 3 pode exigir</text>
  <text class="muted" x="1108" y="706">URAN (ureia + AN)</text>
  <text class="muted" x="1108" y="728">Forma 4 pode exigir</text>
  <text class="muted" x="1108" y="750">dividir em 2 caldas</text>
  <text class="muted" x="1108" y="772">Forma 5 pode exigir</text>
  <text class="muted" x="1108" y="794">ajustes de pH/aditivos</text>
</svg>
