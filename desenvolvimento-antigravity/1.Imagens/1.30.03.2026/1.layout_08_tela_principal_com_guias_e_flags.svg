<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900">
  <defs>
    <style>
      .bg { fill: #0f1115; }
      .panel { fill: #151923; stroke: #2a3142; stroke-width: 1; }
      .panel2 { fill: #111522; stroke: #2a3142; stroke-width: 1; }
      .chip { fill: #1d2433; stroke: #2a3142; stroke-width: 1; }
      .tab { fill: #1a2130; stroke: #2a3142; stroke-width: 1; }
      .tab_on { fill: #16c6d4; }
      .btn { fill: #16c6d4; }
      .btn2 { fill: #2a3142; }
      .title { fill: #d7dde8; font: 700 22px "Segoe UI", Arial, sans-serif; }
      .subtitle { fill: #9aa6bd; font: 500 14px "Segoe UI", Arial, sans-serif; }
      .label { fill: #c2cbe0; font: 700 13px "Segoe UI", Arial, sans-serif; }
      .text { fill: #c2cbe0; font: 400 13px "Segoe UI", Arial, sans-serif; }
      .muted { fill: #8b95aa; font: 400 12px "Segoe UI", Arial, sans-serif; }
      .mono { fill: #c2cbe0; font: 500 12px "Consolas", "Segoe UI", monospace; }
      .accent { fill: #16c6d4; font: 800 26px "Segoe UI", Arial, sans-serif; }
      .chk { fill: #0e1320; stroke: #2a3142; stroke-width: 1; }
      .chk_on { fill: #0d2b2e; stroke: #16c6d4; stroke-width: 1; }
      .chk_mark { fill: none; stroke: #d7dde8; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1440" height="900"/>

  <rect class="panel" x="24" y="20" width="1392" height="68" rx="12"/>
  <text class="accent" x="48" y="62">OrionAgroquim</text>
  <text class="subtitle" x="242" y="60">Simulador de Formulação IN39 (Q.S.P 100 L)</text>
  <rect class="chip" x="1160" y="34" width="110" height="40" rx="10"/>
  <text class="label" x="1178" y="59">Modo</text>
  <text class="text" x="1226" y="59">Dark</text>
  <rect class="chip" x="1286" y="34" width="110" height="40" rx="10"/>
  <text class="label" x="1304" y="59">Base</text>
  <text class="text" x="1348" y="59">IN39</text>

  <rect class="panel" x="24" y="104" width="1392" height="772" rx="12"/>

  <rect class="panel2" x="44" y="124" width="1352" height="54" rx="12"/>
  <rect class="tab_on" x="60" y="136" width="210" height="30" rx="15"/>
  <text class="label" x="118" y="157" fill="#071014">PRINCIPAL</text>
  <rect class="tab" x="278" y="136" width="240" height="30" rx="15"/>
  <text class="label" x="336" y="157">TOP 5 FORMAS</text>
  <rect class="tab" x="526" y="136" width="280" height="30" rx="15"/>
  <text class="label" x="566" y="157">FORMULAÇÃO MANUAL</text>
  <rect class="tab" x="814" y="136" width="160" height="30" rx="15"/>
  <text class="label" x="866" y="157">LAUDO</text>
  <rect class="chip" x="1186" y="136" width="190" height="30" rx="15"/>
  <text class="muted" x="1200" y="157">Motor: Básico (rápido)</text>

  <rect class="panel" x="44" y="192" width="460" height="664" rx="12"/>
  <text class="title" x="68" y="232">Alvos, Condições e Motor</text>
  <text class="subtitle" x="68" y="256">Ajuste as bibliotecas consideradas antes de calcular.</text>

  <rect class="panel2" x="64" y="276" width="420" height="92" rx="10"/>
  <text class="label" x="80" y="304">Temperatura (°C)</text>
  <rect class="chip" x="80" y="316" width="130" height="34" rx="8"/>
  <text class="mono" x="94" y="338">25</text>
  <text class="label" x="232" y="304">Volume Q.S.P (L)</text>
  <rect class="chip" x="232" y="316" width="130" height="34" rx="8"/>
  <text class="mono" x="246" y="338">100</text>

  <rect class="panel2" x="64" y="384" width="420" height="262" rx="10"/>
  <text class="label" x="80" y="412">Nutrientes-alvo (%)</text>
  <text class="muted" x="80" y="434">Preencha só os alvos desejados.</text>

  <rect class="chip" x="80" y="452" width="388" height="38" rx="10"/>
  <text class="label" x="94" y="476">N</text>
  <rect class="panel2" x="128" y="460" width="110" height="22" rx="6"/>
  <text class="mono" x="140" y="476">4.00</text>
  <text class="muted" x="248" y="476">%</text>

  <rect class="chip" x="80" y="498" width="388" height="38" rx="10"/>
  <text class="label" x="94" y="522">P2O5</text>
  <rect class="panel2" x="128" y="506" width="110" height="22" rx="6"/>
  <text class="mono" x="140" y="522">6.00</text>
  <text class="muted" x="248" y="522">%</text>

  <rect class="chip" x="80" y="544" width="388" height="38" rx="10"/>
  <text class="label" x="94" y="568">K2O</text>
  <rect class="panel2" x="128" y="552" width="110" height="22" rx="6"/>
  <text class="mono" x="140" y="568">8.00</text>
  <text class="muted" x="248" y="568">%</text>

  <rect class="chip" x="80" y="590" width="388" height="38" rx="10"/>
  <text class="label" x="94" y="614">Ca</text>
  <rect class="panel2" x="128" y="598" width="110" height="22" rx="6"/>
  <text class="mono" x="140" y="614">1.00</text>
  <text class="muted" x="248" y="614">%</text>

  <rect class="panel2" x="64" y="662" width="420" height="136" rx="10"/>
  <text class="label" x="80" y="690">Bibliotecas consideradas no cálculo</text>
  <text class="muted" x="80" y="712">Flags ligadas alteram o motor e a explicação do resultado.</text>

  <rect class="chip" x="80" y="726" width="388" height="30" rx="10"/>
  <rect class="chk_on" x="90" y="733" width="16" height="16" rx="3"/>
  <path class="chk_mark" d="M94 741 L97 745 L104 736"/>
  <text class="text" x="116" y="747">numpy (cálculo base)</text>

  <rect class="chip" x="80" y="762" width="388" height="30" rx="10"/>
  <rect class="chk_on" x="90" y="769" width="16" height="16" rx="3"/>
  <path class="chk_mark" d="M94 777 L97 781 L104 772"/>
  <text class="text" x="116" y="783">pandas (ler CSV)</text>

  <rect class="chip" x="80" y="798" width="388" height="30" rx="10"/>
  <rect class="chk" x="90" y="805" width="16" height="16" rx="3"/>
  <text class="text" x="116" y="819">scipy (otimização)</text>
  <text class="muted" x="310" y="819">opcional</text>

  <rect class="btn" x="44" y="820" width="460" height="56" rx="12"/>
  <text class="label" x="204" y="855" fill="#071014">CALCULAR FORMAS</text>

  <rect class="panel" x="524" y="192" width="872" height="664" rx="12"/>
  <text class="title" x="548" y="232">Formas de Atingir os Alvos</text>
  <text class="subtitle" x="548" y="256">Resultados em guias: Principal / Top 5 / Formulação Manual.</text>

  <rect class="panel2" x="544" y="276" width="832" height="150" rx="12"/>
  <text class="label" x="564" y="306">Resumo</text>
  <text class="text" x="564" y="330">Receita sugerida para 100 L, com status de risco e observações.</text>
  <text class="muted" x="564" y="356">Motor: numpy + pandas | scipy desligado</text>
  <rect class="btn2" x="1216" y="292" width="160" height="36" rx="10"/>
  <text class="label" x="1240" y="316">GERAR LAUDO</text>

  <rect class="panel2" x="544" y="440" width="832" height="416" rx="12"/>
  <text class="label" x="564" y="472">Tabela de Receita (100 L)</text>
  <rect class="chip" x="564" y="488" width="792" height="34" rx="10"/>
  <text class="label" x="580" y="510">Insumo</text>
  <text class="label" x="1120" y="510">Massa (kg)</text>
  <text class="label" x="1266" y="510">Obs</text>
  <rect class="panel2" x="564" y="532" width="792" height="304" rx="10"/>
  <text class="mono" x="580" y="562">MAP (Fosfato Monoamônico)</text>
  <text class="mono" x="1120" y="562">12.430</text>
  <text class="mono" x="1266" y="562">P2O5 + N</text>
  <text class="mono" x="580" y="590">Nitrato de Potássio</text>
  <text class="mono" x="1120" y="590">14.200</text>
  <text class="mono" x="1266" y="590">K2O + N</text>
  <text class="mono" x="580" y="618">Cloreto de Cálcio</text>
  <text class="mono" x="1120" y="618">2.840</text>
  <text class="mono" x="1266" y="618">Ca</text>
  <text class="muted" x="580" y="660">Ir para “TOP 5 FORMAS” para ver alternativas em guias Forma 1..5.</text>
  <text class="muted" x="580" y="682">Ir para “FORMULAÇÃO MANUAL” para selecionar insumos e metas manualmente.</text>
</svg>
