  <text class="label" x="820" y="502">Massa</text>
  <text class="label" x="900" y="502">N</text>
  <text class="label" x="950" y="502">P2O5</text>
  <text class="label" x="1014" y="502">K2O</text>
  <text class="label" x="1064" y="502">Ca+</text>
  <text class="label" x="1110" y="502">Mg</text>
  <text class="label" x="1148" y="502">SO4</text>
  <text class="label" x="1202" y="502">B</text>
  <text class="label" x="1240" y="502">Zn</text>
  <text class="label" x="1278" y="502">Cu</text>
  <text class="label" x="1316" y="502">Mn</text>
  <text class="label" x="1356" y="502">Mo</text>

  <rect class="panel2" x="504" y="524" width="872" height="262" rx="10"/>
  <text class="mono" x="520" y="550">MAP Cristal</text>
  <text class="mono" x="820" y="550">10.484</text>
  <text class="mono" x="900" y="550">0.92</text>
  <text class="mono" x="950" y="550">5.02</text>
  <text class="mono" x="1202" y="550">0.00</text>
  <text class="mono" x="520" y="580">Uréia</text>
  <text class="mono" x="820" y="580">25.260</text>
  <text class="mono" x="900" y="580">9.08</text>
  <text class="mono" x="520" y="610">Ácido Bórico</text>
  <text class="mono" x="820" y="610">4.000</text>
  <text class="mono" x="1202" y="610">0.54</text>
  <text class="mono" x="520" y="640">Octaborato de Sódio</text>
  <text class="mono" x="820" y="640">6.000</text>
  <text class="mono" x="1202" y="640">0.96</text>
  <text class="mono" x="520" y="670">Água</text>
  <text class="mono" x="820" y="670">79.589</text>

  <rect class="chip" x="504" y="804" width="872" height="58" rx="10"/>
  <text class="label" x="520" y="830">Ressalvas</text>
  <text class="muted" x="520" y="852">- Se houver ureia: sugerir NBPT (IN39) | - B em 2 fontes melhora janela operacional | - seguir ordem de preparo</text>
</svg>
