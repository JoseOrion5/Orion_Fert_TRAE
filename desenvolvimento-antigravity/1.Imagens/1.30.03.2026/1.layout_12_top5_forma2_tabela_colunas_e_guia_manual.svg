  <text class="subtitle" x="488" y="170">Aba atual: FORMA 2 — mitigada. Inclui tabela detalhada por colunas.</text>

  <rect class="panel2" x="484" y="192" width="912" height="52" rx="12"/>
  <rect class="tab" x="500" y="204" width="140" height="28" rx="14"/>
  <text class="label" x="534" y="224">FORMA 1</text>
  <rect class="tab_on" x="648" y="204" width="140" height="28" rx="14"/>
  <text class="label" x="682" y="224" fill="#071014">FORMA 2</text>
  <rect class="tab" x="796" y="204" width="140" height="28" rx="14"/>
  <text class="label" x="830" y="224">FORMA 3</text>
  <rect class="tab" x="944" y="204" width="140" height="28" rx="14"/>
  <text class="label" x="978" y="224">FORMA 4</text>
  <rect class="tab" x="1092" y="204" width="140" height="28" rx="14"/>
  <text class="label" x="1126" y="224">FORMA 5</text>
  <rect class="tab" x="1240" y="204" width="140" height="28" rx="14"/>
  <text class="label" x="1252" y="224">FORM. MANUAL</text>

  <rect class="panel2" x="484" y="258" width="912" height="140" rx="12"/>
  <rect class="pill_warn" x="500" y="278" width="160" height="28" rx="14"/>
  <text class="warn" x="536" y="298">MITIGADA</text>
  <text class="label" x="676" y="296">B com 2 fontes + ressalvas</text>
  <text class="muted" x="676" y="318">Objetivo: ampliar janela operacional e reduzir risco de cristalização.</text>
  <text class="mono" x="500" y="352">Motor: pandas + numpy | filtros de risco + recomendações</text>
  <rect class="btn2" x="1230" y="286" width="146" height="36" rx="10"/>
  <text class="label" x="1250" y="310">GERAR LAUDO</text>

  <rect class="panel2" x="484" y="412" width="912" height="464" rx="12"/>
  <text class="label" x="504" y="440">Tabela — insumo x nutrientes (colunas)</text>
  <text class="muted" x="504" y="462">Insumos | Massa | N | P2O5 | K2O | Ca+ | Mg | SO4 | B | Zn | Cu | Mn | Mo</text>

