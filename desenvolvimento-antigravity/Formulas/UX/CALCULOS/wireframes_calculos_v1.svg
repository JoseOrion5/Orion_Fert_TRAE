      .txt { font: 12px Arial, sans-serif; fill: #111; }
      .muted { font: 12px Arial, sans-serif; fill: #555; }
      .box { fill: #fff; stroke: #111; stroke-width: 2; }
      .soft { fill: #f7f7f7; stroke: #111; stroke-width: 2; }
      .chip { fill: #fff; stroke: #111; stroke-width: 1.5; }
      .btn { fill: #eaeaea; stroke: #111; stroke-width: 2; }
      .badge { fill: #fff; stroke: #111; stroke-width: 1.5; }
      .sep { stroke: #999; stroke-width: 1; stroke-dasharray: 6 6; }
    </style>
  </defs>

  <rect x="20" y="20" width="1360" height="2960" class="soft"/>
